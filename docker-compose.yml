services:

  postgres:
    image: postgres:15
    container_name: messenger_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: messenger
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  server:
    build:
      context: ./server
    container_name: messenger_server
    restart: always
    volumes:
      - ./public:/app/public
    ports:
      - "3000:3000"
    depends_on:
      - postgres


  nginx:
    image: nginx:latest
    container_name: messenger_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./public:/usr/share/nginx/html
    depends_on:
      - server


volumes:
  pgdata: