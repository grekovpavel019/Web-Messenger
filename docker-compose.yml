services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DB: messenger
    ports:
      - "5432:5432"
    volumes:
      - ./db/scema.sql:/docker-entrypoint-initdb.d/scema.sql
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata: