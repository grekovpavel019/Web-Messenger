<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth auth--register">
        <div class="auth__card">
            <h1 class="auth__title">
                Регистрация
            </h1>

            <form action="" class="auth__form">

                <div class="auth__block">
                    <label for="reg-login">Логин</label>
                    <input id="reg-login" type="text" class="auth__input">
                </div>

                <div class="auth__block">
                    <label for="reg-password">Пароль</label>
                    <input id="reg-password" type="password" class="auth__input">
                </div>

                <div class="auth__block">
                    <label for="reg-password-confirm">Подтвердите пароль</label>
                    <input id="reg-password-confirm" type="password" class="auth__input">
                </div>

                <button class="auth__button">
                    Создать аккаунт
                </button>

                <div class="auth__checkbox">
                    <label for="reg-priv-pol">Политика конфиденсальности</label>
                    <input id="reg-priv-pol" type="checkbox">
                </div>
            </form>

            <a href="/public/login.html" class="auth__link">Уже есть аккаунт</a>

        </div>
    </main>

    <script src="js/register.js" type="module"></script>
    <script src="js/auth/validation.js" type="module"></script>
</body>
</html>
