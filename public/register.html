<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth auth--register">
        <div class="auth__card">
            <h1 class="auth__title">
                Регистрация
            </h1>

            <form action="" class="auth__form">

                <div class="auth__block">
                    <label for="">Логин</label>
                    <input type="text" class="auth__input">
                </div>

                <div class="auth__block">
                    <label for="">Пароль</label>
                    <input type="text" class="auth__input">
                </div>

                <div class="auth__block">
                    <label for="">Подтвердите пароль</label>
                    <input type="text" class="auth__input">
                </div>

                <button class="auth__button">
                    Создать аккаунт
                </button>

                <div class="auth__checkbox">
                    <label for="">Политика конфиденсальности</label>
                    <input type="checkbox">
                </div>
            </form>

            <a href="/login.html" class="auth__link">Уже есть аккаунт!</a>

        </div>
    </main>
</body>
</html>
