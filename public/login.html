<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth auth--login">
        <div class="auth__card">
            <h1 class="auth__title">
                Вход
            </h1>

            <form action="" class="auth__form" novalidate>
                <label for="log-login">Логин</label>
                <input id="log-login" type="text" class="auth__input" required>

                <label for="log-password">Пароль</label>
                <input id="log-password" type="password" class="auth__input" required>

                <button type="submit" id="log-button" class="auth__button">
                    Войти
                </button>
            </form>

            <a href="/register.html" class="auth__link">Еще нет аккаунта?</a>
        </div>
    </main>

    <script src="js/login.js" type="module"></script>
</body>
</html>
