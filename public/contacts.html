<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth auth--contacts">
        <div class="auth__card">

            <h1 class="auth__title">
                Свяжитесь с нами
                
            </h1>

            <form action="POST" class="auth__form" novalidate>

                <label for="contact-name">Ваше имя</label>
                <input
                    id="contact-name"
                    type="text"
                    class="auth__input"
                    required
                >

                <label for="contact-email">Email</label>
                <input
                    id="contact-email"
                    type="email"
                    class="auth__input"
                    required
                >

                <label for="contact-subject">Тема</label>
                <input
                    id="contact-subject"
                    type="text"
                    class="auth__input"
                    required
                >

                <label for="contact-message">Сообщение</label>
                <textarea
                    id="contact-message"
                    class="auth__input"
                    rows="6"
                    required
                ></textarea>

                <button
                    type="submit"
                    id="contact-button"
                    class="auth__button"
                >
                    Отправить
                </button>

            </form>

            <a href="/login.html" class="auth__link">
                Вернуться ко входу
            </a>

        </div>
    </main>

    <script src="js/contact.js" type="module"></script>
</body>
</html>
