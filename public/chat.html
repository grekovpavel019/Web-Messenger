<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">

        <div class="chat">
            <header class="chat__header">
                <h1 class="chat__title">ВКонтакте</h1>
            </header>
            
            <aside id="chat__users" class="chat__users">
                <div class="user__list">
                    <div class="user__item">
                        <h1>Общая группа</h1>
                    </div>
                </div>

                <div class="user__logout">
                    <button id="logout" class="chat__button">Выйти</button>
                </div>
            </aside>
            
            <main class="chat__main">
                <div class="chat__messages">
                </div>
                
                <form action="" class="chat__form">
                    <input type="text" class="chat__input">
                    <button class="chat__button">Send</button>
                </form>
            </main>
        </div>
    </div>
        
    <script src="js/chat.js" type="module"></script>
</body>
</html>
