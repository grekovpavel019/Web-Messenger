<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">

        <div class="chat">
            <header class="chat__header">
                <h1 class="chat__title">ВКонтакте</h1>
            </header>
            
            <aside id="chat__actions" class="chat__actions">
                <div class="action__list">
                    <button class="action__help chat__button"><a href="/contacts">Написать отзыв</a></button>
                </div>

                <div class="action__logout">
                    <button id="logout" class="chat__button">Выйти</button>
                </div>
            </aside>
            
            <main class="chat__main">
                <div class="chat__messages">
                </div>
                
                <form class="chat__form">
                    <input type="text" class="chat__input">
                    <button class="chat__button">Send ➤</button>
                </form>
            </main>
        </div>
    </div>
        
    <script src="/js/chat.js" type="module"></script>
</body>
</html>
