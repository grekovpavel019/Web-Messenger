server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index login.html index.html;

    # =======================================================
    # 1. ЗАЩИТА СТРАНИЦ АВТОРИЗАЦИИ (Ловим и чистый URL, и .html файлы)
    # =======================================================
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        rewrite ^ /login.html permanent;
    }
    location = /login{
        auth_request /api/guest_check;
        error_page 403 =302 $scheme://$http_host/chat;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        
        rewrite ^ /login.html break;
    }
    location = /register{
        auth_request /api/guest_check;
        error_page 403 =302 $scheme://$http_host/chat;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        
        rewrite ^ /register.html break;
    }

    # =======================================================
    # 3. ЗАЩИТА ЧАТА (/chat)
    # =======================================================
    location = /chat {
        auth_request /api/user_check; 
        error_page 401 403 =302 $scheme://$http_host/login;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        
        # Исправлено: убрали try_files, который вызывал 500 ошибку, заменили на безопасный break
        rewrite ^ /chat.html break;
    }

    # Если кто-то ломится напрямую на .html файлы — кидаем на чистые URL
    location ~* ^/(login|register|chat)\.html$ {
        return 301 $scheme://$http_host/$1;
    }

    # Внутренний подзапрос для ГОСТЯ
    location = /api/guest_check {
        internal;
        proxy_pass http://backend:3000/api/guest_check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Внутренний подзапрос для ЮЗЕРА
    location = /api/user_check {
        internal;
        proxy_pass http://backend:3000/api/user_check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # =======================================================
    # 4. СТАТИКА (JS, CSS, Картинки) И ОСТАЛЬНОЕ
    # =======================================================
    location / {
        try_files $uri $uri.html;
    }

    # ПРОКСИ API
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}