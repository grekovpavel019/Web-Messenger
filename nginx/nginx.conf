events {}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index login.html index.html;

        location = /auth_guest {
            internal;
            proxy_pass http://server:3000/api/guest_check;
            proxy_set_header Cookie $http_cookie;
        }

        location = /auth_user {
            internal;
            proxy_pass http://server:3000/api/user_check;
            proxy_set_header Cookie $http_cookie;
        }

        location = / {
            return 302 /login;
        }

        location = /login {
            auth_request /auth_guest;
            error_page 403 =302 /chat;
            try_files /login.html =404;
        }

        location = /register {
            auth_request /auth_guest;
            error_page 403 =302 /chat;
            try_files /register.html =404;
        }

        location = /chat {
            auth_request /auth_user;
            error_page 401 =302 /login;
            try_files /chat.html =404;
        }

        location = /contacts {
            auth_request /auth_user;
            error_page 401 =302 /login;
            try_files /contacts.html =404;
        }

        location = /favicon.ico {
            return 204;
        }

        location /css/ {}

        location /js/ {}

        location /api/ {
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location / {
            try_files $uri $uri.html =404;
        }
    }
}