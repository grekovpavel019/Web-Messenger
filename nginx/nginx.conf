events {}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name localhost;

        # Корневая папка с фронтендом внутри контейнера Nginx
        root /usr/share/nginx/html;
        index login.html index.html;

        # Редирект с главной страницы на страницу логина
        location = / {
            rewrite ^ /login.html permanent;
        }

        # Nginx сам отдает HTML-страницы из папки /public
        location = /login {
            rewrite ^ /login.html break;
        }

        location = /register {
            rewrite ^ /register.html break;
        }

        location = /chat {
            rewrite ^ /chat.html break;
        }

        # Раздача статики (CSS и JS)
        location /css/ {
            # Ищет файлы в /usr/share/nginx/html/css/
        }

        location /js/ {
            # Ищет файлы в /usr/share/nginx/html/js/
        }

        # Проксирование обычных HTTP API запросов на Node.js бэкенд
        location /api/ {
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Корень умеет отдавать файлы, а если к нему стучится WebSocket (ws://localhost/) —
        # он перенаправляет запрос в именованный location @websocket
        location / {
            try_files $uri $uri.html @websocket;
        }

        # Обработка WebSocket-соединений, прилетающих на корень проекта
        location @websocket {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}